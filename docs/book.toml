[book]
title = "ActantDB — Documentation"
description = "The autonomous-action backend. Substrate specs, SDK references, deployment guide, SLOs."
authors = ["The ActantDB Authors"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/Prompt-or-Die-Labs/actantdb"
edit-url-template = "https://github.com/Prompt-or-Die-Labs/actantdb/edit/main/docs/src/{path}"
