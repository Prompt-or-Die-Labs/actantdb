[package]
name = "actant-ffi"
description = "Embeddable ActantDB surface exposed via uniffi-rs (iOS / macOS / future Kotlin)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

# Builds as:
# - `cdylib` / `staticlib` for the iOS XCFramework workflow (see GAPS #41).
# - `rlib`   for in-tree `cargo test -p actant-ffi`.
[lib]
name = "actant_ffi"
crate-type = ["cdylib", "staticlib", "rlib"]

# Hosts `uniffi-bindgen` so Swift/Kotlin glue is generated by the same uniffi
# minor that the runtime crate was compiled against. See README §"Generating
# Swift bindings".
[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi_bindgen.rs"

[dependencies]
actant-core    = { workspace = true }
actant-storage = { workspace = true }
actant-command = { workspace = true }
serde_json     = { workspace = true }
sqlx           = { workspace = true }
thiserror      = { workspace = true }
tokio          = { workspace = true }
uniffi         = { workspace = true }

[build-dependencies]
uniffi = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio    = { workspace = true }

[features]
default = []
# Enables the iOS-clean profile downstream. Forwards to actant-storage's
# bundled-sqlite feature once that lands. Today the feature exists as a
# marker so the CI build-ios job can pass `--features ios` without error.
ios = []
