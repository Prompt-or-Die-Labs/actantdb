[package]
name = "actant-worker-mcp"
description = "Bridge to MCP servers; one tool call per lease."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "actant-worker-mcp"
path = "src/main.rs"

[lib]
name = "actant_worker_mcp"
path = "src/lib.rs"

[dependencies]
actant-core            = { workspace = true }
actant-effects         = { workspace = true }
actant-storage         = { workspace = true }
actant-worker-protocol = { workspace = true }
anyhow                 = { workspace = true }
async-trait            = { workspace = true }
clap                   = { workspace = true }
reqwest                = { workspace = true }
serde                  = { workspace = true }
serde_json             = { workspace = true }
tokio                  = { workspace = true }
tracing                = { workspace = true }
tracing-subscriber     = { workspace = true }
