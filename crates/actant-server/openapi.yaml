openapi: 3.0.3
info:
  title: ActantDB HTTP API
  version: 0.0.1
  description: |
    The HTTP+WebSocket surface for `actantdb-server`. See
    `/specs/08-api-spec.md` for the design.
servers:
  - url: http://127.0.0.1:4555
    description: Local default.
paths:
  /v1/healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  time: { type: string, format: date-time }
  /v1/metadata/commands:
    get:
      summary: List known command types
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  commands:
                    type: array
                    items: { type: string }
  /v1/command:
    post:
      summary: Dispatch a command
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandResponse"
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /v1/events:
    get:
      summary: List Chronicle events for a session
      parameters:
        - name: session_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { type: object }
  /v1/approvals:
    get:
      summary: List pending approvals in a workspace
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  approvals:
                    type: array
                    items: { type: object }
  /v1/replay/checkpoint:
    post:
      summary: Create a replay checkpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, event_id]
              properties:
                workspace_id: { type: string }
                event_id: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkpoint_id: { type: string }
  /v1/replay/run:
    post:
      summary: Run a replay from a checkpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actor_id, checkpoint_id, mode]
              properties:
                actor_id: { type: string }
                checkpoint_id: { type: string }
                mode:
                  type: string
                  enum: [recorded, model, policy, memory]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object }
  /v1/metrics:
    get:
      summary: Prometheus text-format metrics
      responses:
        "200":
          description: text/plain v0.0.4
          content:
            text/plain: {}
  /v1/ws:
    get:
      summary: WebSocket subscription
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string }
        - name: session_id
          in: query
          required: false
          schema: { type: string }
        - name: kind
          in: query
          required: false
          schema: { type: string, default: events }
      responses:
        "101":
          description: Switching Protocols
  /v1/memories:
    get:
      summary: List memories filtered by approval status
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [approved, pending, rejected, all]
            default: approved
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  memories:
                    type: array
                    items: { type: object }
        "400": { $ref: "#/components/responses/Error" }
  /v1/memories/conflicts:
    get:
      summary: List memory_conflict rows detected for a workspace
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  conflicts:
                    type: array
                    items: { type: object }
  /v1/permissions:
    get:
      summary: List active authority_scope rows for a workspace
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  permissions:
                    type: array
                    items: { type: object }
    post:
      summary: Grant an authority_scope
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, actor_id, permission, level]
              properties:
                workspace_id: { type: string }
                actor_id: { type: string }
                permission: { type: string }
                level:
                  type: string
                  enum: [public, low, medium, high, secret, regulated]
                scope: { type: string, nullable: true }
                allowed_actions:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
        "400": { $ref: "#/components/responses/Error" }
    delete:
      summary: Soft-revoke an authority_scope
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, authority_scope_id]
              properties:
                workspace_id: { type: string }
                authority_scope_id: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "404": { $ref: "#/components/responses/Error" }
  /v1/setup-reports:
    get:
      summary: List recent setup-report artifacts, or fetch the latest one
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string }
        - name: latest
          in: query
          required: false
          schema: { type: boolean }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                description: |
                  When `latest=true`, returns `{ report: object|null }`. Otherwise
                  returns `{ reports: [{ artifact_id, event_id, content, created_at }] }`.
    post:
      summary: Append a setup-report agent_event plus a matching artifact
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, actor_id, content]
              properties:
                workspace_id: { type: string }
                actor_id: { type: string }
                content: { type: string }
                sensitivity:
                  type: string
                  enum: [public, low, medium, high, secret, regulated]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact_id: { type: string }
                  event_id: { type: string }
        "400": { $ref: "#/components/responses/Error" }
  /v1/scout-records:
    get:
      summary: List scout-record artifacts (optionally filtered by source)
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string }
        - name: source
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items: { type: object }
    post:
      summary: Append a scout-record agent_event plus a matching artifact
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, actor_id, source_id, kind, sensitivity, content]
              properties:
                workspace_id: { type: string }
                actor_id: { type: string }
                source_id: { type: string }
                kind: { type: string }
                sensitivity:
                  type: string
                  enum: [public, low, medium, high, secret, regulated]
                content: { type: string }
                metadata: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact_id: { type: string }
                  event_id: { type: string }
        "400": { $ref: "#/components/responses/Error" }

  /v1/entities:
    get:
      summary: List entities in a workspace, optionally filtered by type
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string }
        - name: type
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items: { type: object }
    post:
      summary: Create a new entity (person, place, project, etc.)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, type, canonical_name]
              properties:
                workspace_id: { type: string }
                type: { type: string }
                canonical_name: { type: string }
                aliases:
                  type: array
                  items: { type: string }
                sensitivity:
                  type: string
                  enum: [public, low, medium, high, secret, regulated]
                capsule_id: { type: string }
                source_events:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
        "400": { $ref: "#/components/responses/Error" }

  /v1/entity-relations:
    get:
      summary: List entity relations; filter by entity (source or target) and/or type
      security:
        - bearerAuth: []
      parameters:
        - name: workspace_id
          in: query
          required: true
          schema: { type: string }
        - name: entity
          in: query
          required: false
          schema: { type: string }
        - name: relation_type
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  relations:
                    type: array
                    items: { type: object }
    post:
      summary: Link two entities with a typed relation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace_id, source_entity, relation_type, target_entity]
              properties:
                workspace_id: { type: string }
                source_entity: { type: string }
                relation_type: { type: string }
                target_entity: { type: string }
                confidence:
                  type: number
                  minimum: 0.0
                  maximum: 1.0
                evidence_events:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
        "400": { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Error:
      description: Structured error body
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string }
              message: { type: string }
  schemas:
    CommandRequest:
      type: object
      required: [workspace_id, actor_id, command_type, input]
      properties:
        workspace_id: { type: string }
        actor_id: { type: string }
        command_type: { type: string }
        input: { type: object }
        idempotency_key: { type: string }
    CommandResponse:
      type: object
      required: [command_id, result]
      properties:
        command_id: { type: string }
        event_id: { type: string, nullable: true }
        result: { type: object }
