<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ActantDB &middot; sign in</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #0e0f12;
    --panel: #15171c;
    --text: #e9ecf2;
    --muted: #8b93a3;
    --accent: #6cb6ff;
    --error: #ff7676;
    --ok: #69d28a;
    --border: #262932;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --text: #161821;
      --muted: #5d6373;
      --accent: #1f5fff;
      --border: #d9dde6;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  main {
    width: 100%;
    max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 28px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  h1 { margin: 0 0 4px; font-size: 19px; letter-spacing: -0.01em; }
  .sub { color: var(--muted); margin: 0 0 22px; font-size: 13px; }
  label { display: block; font-size: 13px; color: var(--muted); margin: 14px 0 6px; }
  input[type=password] {
    width: 100%;
    padding: 11px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font: inherit;
  }
  input[type=password]:focus {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    border-color: var(--accent);
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 18px;
    background: var(--accent);
    color: #000;
    border: 0;
    border-radius: 8px;
    font: 600 14px inherit;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg { min-height: 18px; margin-top: 10px; font-size: 13px; }
  .msg.error { color: var(--error); }
  .msg.ok { color: var(--ok); }
  .links {
    margin-top: 18px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
  .links a { color: var(--accent); text-decoration: none; }
  .links a:hover { text-decoration: underline; }
</style>
</head>
<body>
<main>
  <h1>Sign in</h1>
  <p class="sub">ActantDB owner credentials.</p>

  <form id="login-form" autocomplete="on" novalidate>
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" required>
    <button id="submit" type="submit">Sign in</button>
    <div id="msg" class="msg" role="status" aria-live="polite"></div>
  </form>

  <div class="links">
    <a href="/link">Have a linking code?</a>
    <a href="#" id="reset-link" title="Run `actantdb-server reset-password` on the host">Forgot password?</a>
  </div>
</main>

<script>
(function () {
  const pw = document.getElementById('pw');
  const btn = document.getElementById('submit');
  const msg = document.getElementById('msg');

  document.getElementById('reset-link').addEventListener('click', e => {
    e.preventDefault();
    msg.className = 'msg';
    msg.textContent = 'Reset is OS-local: run `actantdb-server reset-password` on the host.';
  });

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    msg.className = 'msg'; msg.textContent = '';
    btn.disabled = true;
    try {
      const r = await fetch('/v1/auth/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ password: pw.value }),
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok) {
        msg.className = 'msg ok';
        msg.textContent = 'Signed in. Redirecting…';
        setTimeout(() => { location.href = '/'; }, 400);
      } else {
        msg.className = 'msg error';
        msg.textContent = (data && data.message) || ('Sign in failed (' + r.status + ').');
        pw.value = '';
        pw.focus();
      }
    } catch (err) {
      msg.className = 'msg error';
      msg.textContent = 'Network error.';
    } finally {
      btn.disabled = false;
    }
  });

  pw.focus();
})();
</script>
</body>
</html>
