[package]
name = "actant-worker-shell"
description = "ActantDB shell-effect worker. Spawns child processes with OS-isolated sandboxing."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "actant-worker-shell"
path = "src/main.rs"

[lib]
name = "actant_worker_shell"
path = "src/lib.rs"

[dependencies]
actant-core            = { workspace = true }
actant-effects         = { workspace = true }
actant-storage         = { workspace = true }
actant-worker-protocol = { workspace = true }
anyhow                 = { workspace = true }
async-trait            = { workspace = true }
clap                   = { workspace = true }
serde                  = { workspace = true }
serde_json             = { workspace = true }
tokio                  = { workspace = true }
tracing                = { workspace = true }
tracing-subscriber     = { workspace = true }

[dev-dependencies]
sqlx = { workspace = true }
