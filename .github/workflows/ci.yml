name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-rust:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace --all-targets

  test-ts:
    name: pnpm test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # `version:` removed deliberately — root package.json carries
        # `packageManager: pnpm@9.0.0`, and the action errors with
        # "Multiple versions specified" when both are set. Source of
        # truth stays in package.json so local + CI can't drift.
      - uses: actions/setup-node@v4
        with:
          # @actantdb/core uses node:sqlite, unflagged starting at Node 24.
          # Node 22 needs --experimental-sqlite; keep this aligned with the
          # publish workflow.
          node-version: 24
          cache: pnpm
      - run: pnpm install --ignore-scripts
      - run: pnpm -r build
      - run: pnpm -r test
      - run: pnpm smoke

  test-python:
    name: python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install actantdb package (editable)
        run: pip install -e sdks/python
      - name: run unit tests
        # Tests live in sdks/python/tests and import `actantdb` directly.
        # Discover them with sdks/python as top-level so package and tests
        # resolve consistently across local + CI.
        run: python3 -m unittest discover -s sdks/python/tests -t sdks/python -v

  test-swift:
    name: swift test (sdks/swift)
    runs-on: macos-latest
    # sdks/swift Package.swift declares swift-tools-version: 6.3 (to match
    # the Swoosh consumer's platform floor of macOS 26 / iOS 26). GH-hosted
    # macos-latest currently ships Swift 6.1; until Swift 6.3 lands on the
    # default Xcode there, this job continues-on-error so it surfaces the
    # gap without blocking the rest of CI.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: swift version
        run: swift --version
      - run: swift test --package-path sdks/swift

  bench-build:
    name: benchmark crate compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p actant-bench --benches

  spec-verify:
    name: spec verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check every spec file has a Verification section
        run: |
          set -e
          fail=0
          for f in specs/*.md; do
            # STATUS.md is a freeze marker, not a spec.
            [ "$(basename "$f")" = "STATUS.md" ] && continue
            if ! grep -q '^## Verification' "$f"; then
              echo "::error file=$f::missing '## Verification' section"
              fail=1
            fi
          done
          exit $fail

  agent-package-lint:
    name: agent package lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every agent work package must have the required sections
        run: |
          set -e
          fail=0
          required=("## Context" "## Scope" "## Specs to read first" "## Acceptance criteria" "## Do NOT")
          for f in agents/actant-*.md; do
            [ -f "$f" ] || continue
            for s in "${required[@]}"; do
              if ! grep -qF "$s" "$f"; then
                echo "::error file=$f::missing section '$s'"
                fail=1
              fi
            done
          done
          exit $fail

  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: latest
      - run: helm lint deploy/helm/actantdb
