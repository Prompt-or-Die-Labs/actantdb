name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-rust:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace --all-targets

  test-ts:
    name: pnpm test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # `version:` removed deliberately — root package.json carries
        # `packageManager: pnpm@9.0.0`, and the action errors with
        # "Multiple versions specified" when both are set. Source of
        # truth stays in package.json so local + CI can't drift.
      - uses: actions/setup-node@v4
        with:
          # @actantdb/core uses node:sqlite, unflagged starting at Node 24.
          # Node 22 needs --experimental-sqlite; keep this aligned with the
          # publish workflow.
          node-version: 24
          cache: pnpm
      - run: pnpm install --ignore-scripts
      - run: pnpm -r build
      - run: pnpm -r test
      - run: pnpm smoke

  test-bun-create:
    name: bun create-actantdb smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: pnpm install --ignore-scripts
      - run: pnpm -r build
      - run: pnpm smoke:bun-create

  test-bun-workspace:
    name: bun workspace ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Some package scripts still intentionally call `node`; keep the
          # version aligned with the pnpm lane while Bun owns install/run here.
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bun run ci:bun

  test-python:
    name: python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install actantdb package (editable)
        run: pip install -e sdks/python
      - name: run unit tests
        # `pip install -e` puts `actantdb` on PYTHONPATH; discover from
        # the tests dir directly with that as top-level so unittest finds
        # the module without needing __init__.py in tests/.
        working-directory: sdks/python
        run: python3 -m unittest discover -s tests -t tests -v

  test-swift:
    name: swift test (sdks/swift)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: swift version
        run: swift --version
      # sdks/swift Package.swift declares swift-tools-version: 6.3 (to
      # match the Swoosh consumer's macOS 26 / iOS 26 platform floor).
      # GH-hosted macos-latest currently ships Swift 6.1 — until 6.3
      # lands on the runner Xcode, this step is allowed to fail without
      # blocking the workflow. The step's failure is still visible in
      # the run UI as a yellow note, so the gap doesn't go quiet.
      - run: swift test --package-path sdks/swift
        continue-on-error: true

  bench-build:
    name: benchmark crate compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p actant-bench --benches

  spec-verify:
    name: spec verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check every spec file has a Verification section
        run: |
          set -e
          fail=0
          for f in specs/*.md; do
            # STATUS.md is a freeze marker, not a spec.
            [ "$(basename "$f")" = "STATUS.md" ] && continue
            if ! grep -q '^## Verification' "$f"; then
              echo "::error file=$f::missing '## Verification' section"
              fail=1
            fi
          done
          exit $fail

  agent-package-lint:
    name: agent package lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every agent work package must have the required sections
        run: |
          set -e
          fail=0
          required=("## Context" "## Scope" "## Specs to read first" "## Acceptance criteria" "## Do NOT")
          for f in agents/actant-*.md; do
            [ -f "$f" ] || continue
            for s in "${required[@]}"; do
              if ! grep -qF "$s" "$f"; then
                echo "::error file=$f::missing section '$s'"
                fail=1
              fi
            done
          done
          exit $fail

  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: latest
      - run: helm lint deploy/helm/actantdb

  build-ios:
    name: cargo build --target aarch64-apple-ios (-p actant-ffi)
    runs-on: macos-latest
    # GAPS.md row #40 — verifies actant-ffi compiles for the iOS device
    # slice. Sim + Mac slices land via the dedicated
    # `ios-xcframework.yml` workflow (which lipo+xcodebuilds on tag push).
    # continue-on-error until any remaining iOS-blocker audit findings
    # are reclassified (see docs/IOS_AUDIT.md "Effective status").
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - run: rustup target add aarch64-apple-ios
      - run: cargo build --target aarch64-apple-ios -p actant-ffi --features ios

  migrations-parity:
    name: postgres migrations parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SQLite vs Postgres migration table sets must not diverge silently
        # GAPS.md row #22 — Postgres schema parity check. The Postgres
        # backend (GAPS row #5) is still catching up to SQLite's schema;
        # this gate makes the diff visible so adding a table to SQLite
        # without mirroring it in `migrations/pg/` fails CI loudly
        # instead of silently widening the gap.
        run: |
          set -e
          extract() {
            cat "$@" 2>/dev/null \
              | sed -nE 's/^CREATE TABLE[[:space:]]+([A-Za-z_][A-Za-z0-9_]*).*/\1/p' \
              | sort -u
          }
          sqlite_tables=$(extract migrations/[0-9]*.sql)
          pg_tables=$(extract migrations/pg/*.sql)
          missing_in_pg=$(comm -23 <(echo "$sqlite_tables") <(echo "$pg_tables"))
          missing_in_sqlite=$(comm -13 <(echo "$sqlite_tables") <(echo "$pg_tables"))
          if [ -n "$missing_in_sqlite" ]; then
            echo "::error::Tables in migrations/pg/ that don't exist in SQLite:"
            echo "$missing_in_sqlite" | sed 's/^/  - /'
            exit 1
          fi
          # Track Postgres lag explicitly: write the count to the run log
          # so reviewers see whether the gap is widening or closing.
          sqlite_n=$(echo "$sqlite_tables" | wc -l)
          pg_n=$(echo "$pg_tables" | wc -l)
          missing_n=$(echo "$missing_in_pg" | wc -l)
          [ -z "$missing_in_pg" ] && missing_n=0
          echo "::notice::Schema parity: pg=$pg_n / sqlite=$sqlite_n; missing in pg=$missing_n"
          if [ -n "$missing_in_pg" ]; then
            echo "Tables defined in migrations/*.sql but MISSING from migrations/pg/:"
            echo "$missing_in_pg" | sed 's/^/  - /'
            echo ""
            echo "This is GAPS.md row #5 (Postgres command-engine). The pg backend"
            echo "is catching up — the parity job will tighten to a hard fail once"
            echo "the SQLite count and the pg count converge."
          fi
          # Soft-fail for now: the job records the gap loudly but doesn't
          # block CI yet. Flip to `exit 1 if missing_n > 0` when the
          # backlog clears.
