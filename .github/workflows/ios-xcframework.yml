name: ios-xcframework

# Build the ActantFFI XCFramework on every `vX.Y.Z` tag, and on demand via
# workflow_dispatch. See `docs/IOS_EMBEDDING.md` §3 for the design.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      CARGO_TARGET_DIR: target/actantffi-xcframework
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88.0

      - name: Add Apple targets
        run: |
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build per-target static libs
        run: |
          for target in aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios aarch64-apple-darwin x86_64-apple-darwin; do
            cargo build --release --target "$target" -p actant-ffi --features ios
          done

      - name: lipo sim + mac universals
        run: |
          mkdir -p "$CARGO_TARGET_DIR/universal"
          lipo -create \
            "$CARGO_TARGET_DIR/aarch64-apple-ios-sim/release/libactant_ffi.a" \
            "$CARGO_TARGET_DIR/x86_64-apple-ios/release/libactant_ffi.a" \
            -output "$CARGO_TARGET_DIR/universal/libactant_ffi-sim.a"
          lipo -create \
            "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/libactant_ffi.a" \
            "$CARGO_TARGET_DIR/x86_64-apple-darwin/release/libactant_ffi.a" \
            -output "$CARGO_TARGET_DIR/universal/libactant_ffi-mac.a"

      - name: Generate Swift bindings (uniffi)
        run: |
          cargo build --release -p actant-ffi
          cargo run --bin uniffi-bindgen -p actant-ffi -- \
            generate \
            --library "$CARGO_TARGET_DIR/release/libactant_ffi.dylib" \
            --language swift \
            --out-dir "$CARGO_TARGET_DIR/swift-bindings"
          perl -0pi -e 's/fileprivate class UniffiHandleMap<T>/fileprivate final class UniffiHandleMap<T>: \@unchecked Sendable/' "$CARGO_TARGET_DIR/swift-bindings/actant_ffi.swift"
          perl -0pi -e 's/private var initializationResult/private let initializationResult/' "$CARGO_TARGET_DIR/swift-bindings/actant_ffi.swift"
          perl -0pi -e 's#\A// This file was autogenerated[^\n]*\n// Trust me,[^\n]*\n#// Generated by uniffi-bindgen. Do not edit by hand.\n#' "$CARGO_TARGET_DIR/swift-bindings/actant_ffi.swift"
          perl -0pi -e 's/[ \t]+$//mg' "$CARGO_TARGET_DIR/swift-bindings/actant_ffi.swift"
          diff -u sdks/swift/Sources/ActantFFI/actant_ffi.swift "$CARGO_TARGET_DIR/swift-bindings/actant_ffi.swift"
          mkdir -p "$CARGO_TARGET_DIR/swift-headers"
          cp "$CARGO_TARGET_DIR/swift-bindings/actant_ffiFFI.h" "$CARGO_TARGET_DIR/swift-headers/"
          cp "$CARGO_TARGET_DIR/swift-bindings/actant_ffiFFI.modulemap" "$CARGO_TARGET_DIR/swift-headers/"
          cp "$CARGO_TARGET_DIR/swift-bindings/actant_ffiFFI.modulemap" "$CARGO_TARGET_DIR/swift-headers/module.modulemap"

      - name: Build XCFramework
        run: |
          xcodebuild -create-xcframework \
            -library "$CARGO_TARGET_DIR/aarch64-apple-ios/release/libactant_ffi.a" \
              -headers "$CARGO_TARGET_DIR/swift-headers" \
            -library "$CARGO_TARGET_DIR/universal/libactant_ffi-sim.a" \
              -headers "$CARGO_TARGET_DIR/swift-headers" \
            -library "$CARGO_TARGET_DIR/universal/libactant_ffi-mac.a" \
              -headers "$CARGO_TARGET_DIR/swift-headers" \
            -output ActantFFI.xcframework

      - name: Zip + checksum
        run: |
          ditto -c -k --keepParent ActantFFI.xcframework ActantFFI.xcframework.zip
          swift package compute-checksum ActantFFI.xcframework.zip > ActantFFI.checksum

      - name: Upload as release asset (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ActantFFI.xcframework.zip
            ActantFFI.checksum

      - name: Upload as artifact (on dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ActantFFI-xcframework
          path: |
            ActantFFI.xcframework.zip
            ActantFFI.checksum
