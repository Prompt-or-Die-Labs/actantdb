# Local-cluster smoke compose: one actantdb-server backed by a Postgres
# sidecar. Run with `docker compose -f deploy/docker/docker-compose.yaml up`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: actantdb
      POSTGRES_USER: actantdb
      POSTGRES_PASSWORD: actantdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actantdb"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - actantdb-pg:/var/lib/postgresql/data

  actantdb:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ACTANTDB_BIND: 0.0.0.0:4555
      ACTANTDB_DATABASE_URL: postgres://actantdb:actantdb@postgres:5432/actantdb
      RUST_LOG: info,actant_server=debug
    ports:
      - "4555:4555"

volumes:
  actantdb-pg:
