# ActantDB — one-line self-host stack.
#
# Spins up:
#   - actantdb-server   (HTTP + WebSocket API on :4555)
#   - caddy             (reverse proxy with auto-TLS; skip for loopback)
#   - mailpit           (local SMTP catcher on :1025, web UI on :8025)
#
# Quickstart:
#   docker compose -f deploy/docker-compose.yml up
#
# Build the server image locally instead of pulling a published one:
#   docker compose -f deploy/docker-compose.yml up --build
#
# See deploy/README.md for the walk-through.

services:
  actantdb-server:
    image: ghcr.io/prompt-or-die-labs/actantdb:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      ACTANTDB_BIND: 0.0.0.0:4555
      ACTANTDB_DB: /data/actantdb.sqlite
      # SMTP-equivalent vars for any worker that wants to send mail
      # against the local catcher instead of a real provider.
      ACTANTDB_SMTP_HOST: mailpit
      ACTANTDB_SMTP_PORT: "1025"
      RUST_LOG: info,actant_server=debug
    ports:
      - "4555:4555"
    volumes:
      - actantdb-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - actantdb-server
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set ACTANTDB_DOMAIN=example.com to get automatic Let's Encrypt
      # certificates for that hostname. Leave unset and Caddy will
      # bind to :80 only — fine for loopback development.
      ACTANTDB_DOMAIN: ${ACTANTDB_DOMAIN:-:80}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit-data:/data
    restart: unless-stopped

volumes:
  actantdb-data:
  caddy-data:
  caddy-config:
  mailpit-data:
