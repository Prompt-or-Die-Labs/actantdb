[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "actantdb"
version = "0.0.1"
description = "Python client SDK for ActantDB."
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [{ name = "The ActantDB Authors" }]
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.setuptools.packages.find]
where = ["."]
include = ["actantdb*"]
